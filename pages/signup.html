<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Yola AI Info Hub</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="pages.css">
</head>
<body>
  <div class="minimal-nav">
    <div class="minimal-nav-content">
      <div href="../index.html" class="nav-logo">
        <img src="../Data/Images/jippujam.jpg" alt="Yola AI Info Hub">
        <span>Yola AI Info Hub</span>
      </div>

      <a href="../index.html" class="return-home">
        <i class="fas fa-home"></i>
        <span>Return Home</span>
      </a>

    </div>
  </div>

  <main class="auth-container">
    <div class="auth-box">
      <h2>Create Account</h2>
      <form id="signup-form" class="auth-form">
        
        <div class="form-group">
          <label for="username">Username*</label>
          <input type="text" id="username" name="username" placeholder="input username" required>
        </div>
        <div class="form-group">
          <label for="email">Email*</label>
          <input type="email" id="email" name="email" placeholder="input email" required>
        </div>
        <div class="form-group">
          <label for="name">Full Name*</label>
          <input type="text" id="name" name="name" placeholder="input your full name" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number*</label>
          <input type="tel" id="phone" name="phone" required pattern="[0-9]{11}" title="Please enter a valid 11-digit phone number" placeholder="input phone number">
        </div>
        <div class="form-group">
          <label for="nin">NIN (11 digits)*</label>
          <input type="text" id="nin" name="nin" required pattern="[0-9]{11}" maxlength="11" placeholder="input NIN number" >
        </div>
        <div class="form-group checkbox-group">
          <label for="yola-resident">Resident of Yola?</label>
          <input type="checkbox" id="yola-resident" name="yolaResident" onchange="handleYolaResident()" style="width: fit-content;">
        </div>
        <div class="form-group">
          <label for="address">Address*</label>
          <input type="text" id="address" name="address" required placeholder="input your full adress">
        </div>
        <div class="form-group">
          <label for="state">State*</label>
          <select id="state" name="state" required onchange="populateLGAs()">
            <option value="">Select State</option>
            <!-- States will be populated by JavaScript -->
          </select>
        </div>
        <div class="form-group">
          <label for="lga">LGA*</label>
          <select id="lga" name="lga" required>
            <option value="">Select LGA</option>
            <!-- LGAs will be populated based on selected state -->
          </select>
        </div>
        <div class="form-group">
          <label for="password">Password*</label>
          <div class="password-field">
            <input type="password" id="password" name="password" required placeholder="input a password">
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password*</label>
          <div class="password-field">
            <input type="password" id="confirm-password" name="confirm-password" required placeholder="input password again">
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirm-password')">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group checkbox-group">
          <label for="terms">I accept the Terms and Conditions*</label>
          <input type="checkbox" id="terms" name="termsAccepted" required style="width: fit-content;">
        </div>
        <button type="submit" class="auth-submit">Create Account</button>
        <div class="auth-links">
          <a href="/pages/signin.html">Already have an account? Sign In</a>
        </div>
      </form>
      <div class="skip-auth">
        <p>Prefer not to sign up?</p>
        <a href="/" class="skip-auth-link">
          <i class="fas fa-arrow-left"></i>
          Return to Homepage
        </a>
      </div>
    </div>
  </main>

  <script src="/components/auth.js"></script>
  <script src="../components/states-lgas.js"></script>
  <script>
    function populateStates() {
      const stateSelect = document.getElementById('state');
      const states = Object.keys(window.STATES_LGAS);
      states.sort();
      stateSelect.innerHTML = '<option value="">Select State</option>';
      states.forEach(state => {
        stateSelect.innerHTML += `<option value="${state}">${state}</option>`;
      });
    }

    function populateLGAs() {
      const stateSelect = document.getElementById('state');
      const lgaSelect = document.getElementById('lga');
      const selectedState = stateSelect.value;
      lgaSelect.innerHTML = '<option value="">Select LGA</option>';
      if (selectedState && window.STATES_LGAS[selectedState]) {
        const lgas = window.STATES_LGAS[selectedState];
        lgas.sort();
        lgas.forEach(lga => {
          lgaSelect.innerHTML += `<option value="${lga}">${lga}</option>`;
        });
      }
    }

    function handleYolaResident() {
      const yolaBox = document.getElementById('yola-resident');
      const stateSelect = document.getElementById('state');
      const lgaSelect = document.getElementById('lga');
      if (yolaBox.checked) {
        stateSelect.innerHTML = '<option value="Adamawa" selected>Adamawa</option>';
        lgaSelect.innerHTML = '<option value="">Select LGA</option>' +
          '<option value="Yola North">Yola North</option>' +
          '<option value="Yola South">Yola South</option>';
        stateSelect.value = 'Adamawa';
        lgaSelect.value = '';
        stateSelect.disabled = true;
      } else {
        stateSelect.disabled = false;
        // repopulate all states and LGAs
        populateStates();
        lgaSelect.innerHTML = '<option value="">Select LGA</option>';
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      populateStates();
    });

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.querySelector('#signup-form button[type="submit"]');
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const username = document.getElementById('username').value;
      
      if (password !== confirmPassword) {
        alert('Passwords do not match');
        return;
      }

      // Check if a different user is already logged in - AUTO LOGOUT
      const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
      if (currentUser && currentUser.username && currentUser.username !== username) {
        console.log(`%c🔄 Auto-logout: User switching from ${currentUser.username} to ${username}`, 'color: #f59e0b; font-weight: bold;');
        // Auto-logout the previous user
        try {
          await fetch(`${API_BASE}/api/logout`, {
            method: 'POST',
            credentials: 'include'
          });
        } catch (err) {
          console.warn('Logout failed during user switch:', err);
        }
        // Clear localStorage
        localStorage.removeItem('currentUser');
        if (window.clearAllChatHistories) window.clearAllChatHistories();
      }

      const formData = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        nin: document.getElementById('nin').value,
        address: document.getElementById('address').value,
        state: document.getElementById('state').value,
        lga: document.getElementById('lga').value,
        password: password,
        termsAccepted: document.getElementById('terms').checked
      };

      // Disable button during request
      submitBtn.disabled = true;

      try {
  const API_BASE = window.API_BASE || (function(){ try{ const h=window.location.hostname; if(!h||h==='localhost'||h==='127.0.0.1'||h.startsWith('192.')||h.startsWith('10.')||h==='::1') return 'http://localhost:4000'; return ''; }catch(e){return 'http://localhost:4000'} })();
  const response = await fetch(`${API_BASE}/api/signup`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify(formData)
        });

        const data = await response.json();
        if (data.success) {
          // Fetch complete user data from /api/me
          try {
            const meRes = await fetch(`${API_BASE}/api/me`, {
              method: 'GET',
              headers: {
                'Accept': 'application/json'
              },
              credentials: 'include'
            });
            
            if (meRes.ok) {
              const meData = await meRes.json();
              if (meData.username) {
                // Update localStorage with complete user data
                localStorage.setItem('currentUser', JSON.stringify({
                  username: meData.username,
                  name: meData.name,
                  email: meData.email,
                  phone: meData.phone,
                  state: meData.state,
                  lga: meData.lga,
                  address: meData.address,
                  profilePicture: meData.profilePicture,
                  avatar: meData.avatar
                }));
              }
            }
          } catch (err) {
            console.warn('Failed to fetch complete user data:', err);
            // Fallback to saving basic signup data
            localStorage.setItem('currentUser', JSON.stringify({
              username: data.username,
              name: data.name
            }));
          }
          window.location.href = '/'; // Redirect to homepage on success
        } else {
          alert(data.error || 'Error signing up');
          // Re-enable button on error
          submitBtn.disabled = false;
        }
      } catch (error) {
        console.error('Sign up error:', error);
        alert('Error signing up. Please try again.');
        // Re-enable button on error
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
