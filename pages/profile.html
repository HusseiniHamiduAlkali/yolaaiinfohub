<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Yola AI Info Hub</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/navbar.css">
  <link rel="stylesheet" href="../details/details.css">
  <link rel="stylesheet" href="pages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
</head>
<body>
  <div id="navbar"></div>
  
  <nav class="minimal-nav">
    <div class="minimal-nav-content">
      <div href="../index.html" class="nav-logo">
        <img src="../Data/Images/jippujam.jpg" alt="Yola AI Info Hub">
        <span>Yola AI Info Hub</span>
      </div>
      <a href="../index.html" class="return-home">
        <i class="fas fa-home"></i>
        <span>Return Home</span>
      </a>
    </div>
  </nav>

  <main>
    <div class="profile-container">
      <div class="success-message" id="success-message">
        <i class="fas fa-check-circle"></i> Profile updated successfully!
      </div>
      
      <div class="profile-header">
        <div class="profile-avatar-wrapper">
          <div class="profile-avatar" id="profile-avatar"></div>
          <div class="profile-avatar-upload-hint" id="avatar-upload-hint" title="Click to change profile picture">
            <i class="fas fa-camera"></i>
          </div>
          <input type="file" id="profile-picture-input" accept="image/*">
        </div>
        
        <div class="profile-meta">
          <h2 id="profile-name">Profile</h2>
          <div class="profile-username-display">
            <span id="profile-username" style="color:#718096">@username</span>
          </div>
          <div class="profile-actions" style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
            <button id="btn-logout" class="auth-btn" style="background:#ef4444;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-weight:600" onclick="window.logoutUser()" title="Logout from your account">
              <i class="fas fa-sign-out-alt" style="margin-right:6px;"></i> Logout
            </button>
            <button id="btn-delete-account" title="Delete account" style="display:none;background:#dc2626;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-weight:600">
              <i class="fas fa-trash-alt" style="margin-right:6px;"></i> Delete account
            </button>
          </div>
          

          
        </div>
      </div>
      
      <!-- View Mode -->
      <div id="profile-view-mode">
        <div class="profile-details" id="profile-details">
          <div class="profile-field" id="pf-email">
            <div class="profile-field-header">
              <strong>Email</strong>
              <button class="edit-icon-btn" data-field="email" title="Edit email">
                <i class="fas fa-edit"></i>
              </button>
            </div>
            <div class="profile-field-value">-</div>
          </div>
          <div class="profile-field" id="pf-phone">
            <div class="profile-field-header">
              <strong>Phone</strong>
              <button class="edit-icon-btn" data-field="phone" title="Edit phone">
                <i class="fas fa-edit"></i>
              </button>
            </div>
            <div class="profile-field-value">-</div>
          </div>
          <div class="profile-field" id="pf-state">
            <div class="profile-field-header">
              <strong>State</strong>
              <button class="edit-icon-btn" data-field="state" title="Edit state">
                <i class="fas fa-edit"></i>
              </button>
            </div>
            <div class="profile-field-value">-</div>
          </div>
          <div class="profile-field" id="pf-lga">
            <div class="profile-field-header">
              <strong>LGA</strong>
              <button class="edit-icon-btn" data-field="lga" title="Edit LGA">
                <i class="fas fa-edit"></i>
              </button>
            </div>
            <div class="profile-field-value">-</div>
          </div>
          <div class="profile-field" id="pf-address" style="grid-column:1 / -1">
            <div class="profile-field-header">
              <strong>Address</strong>
              <button class="edit-icon-btn" data-field="address" title="Edit address">
                <i class="fas fa-edit"></i>
              </button>
            </div>
            <div class="profile-field-value">-</div>
          </div>
        </div>
      </div>
      
    
  </main>
  <script>
    // Render navbar if available
    window.Navbar && window.Navbar.render && window.Navbar.render();
    
    const params = new URLSearchParams(window.location.search);
    const u = params.get('u');
    const API_BASE = window.API_BASE || (function(){ 
      try{ 
        const h = window.location.hostname; 
        if(!h||h==='localhost'||h==='127.0.0.1'||h.startsWith('192.')||h.startsWith('10.')||h==='::1') return 'http://localhost:4000'; 
        return 'https://yolaaiinfohub-backend.onrender.com'; 
      } catch(e) { 
        return 'http://localhost:4000' 
      } 
    })();
    
    let currentUserData = null;
    let isEditMode = false;
    let isOwnProfile = false;  // Track if viewing own profile
    
    // Elements (guarded - some elements may not exist in this template)
    const btnEditProfile = null;  // This profile uses inline editing, not a separate edit mode
    const btnCancelEdit = null;
    const btnCancelForm = null;
    const profileForm = null;
    const profileViewMode = document.getElementById('profile-view-mode');
    const successMessage = document.getElementById('success-message');
    const avatarUploadHint = document.getElementById('avatar-upload-hint');
    const profilePictureInput = document.getElementById('profile-picture-input');
    const editProfilePictureInput = document.getElementById('edit-profile-picture-input');
    const btnDeleteAccount = document.getElementById('btn-delete-account');
    const btnLogout = document.getElementById('btn-logout');

    // Event listeners (only attach if element exists)
    if (btnEditProfile) btnEditProfile.addEventListener('click', enterEditMode);
    if (btnCancelEdit) btnCancelEdit.addEventListener('click', exitEditMode);
    if (btnCancelForm) btnCancelForm.addEventListener('click', exitEditMode);
    if (profileForm) profileForm.addEventListener('submit', saveProfile);
    if (avatarUploadHint && profilePictureInput) avatarUploadHint.addEventListener('click', () => profilePictureInput.click());
    if (profilePictureInput) profilePictureInput.addEventListener('change', handleAvatarUpload);
    if (editProfilePictureInput) editProfilePictureInput.addEventListener('change', handleEditAvatarUpload);
    if (btnDeleteAccount) btnDeleteAccount.addEventListener('click', handleDeleteAccountClick);
    if (btnLogout) btnLogout.addEventListener('click', () => window.logoutUser());
    
    async function loadProfile() {
      // Try to restore user from localStorage first
      let restoredUser = null;
      try {
        const stored = localStorage.getItem('currentUser');
        if (stored) {
          restoredUser = JSON.parse(stored);
        }
      } catch (e) { /* ignore */ }
      
      // If user is logged in, load their own profile (ignore u parameter)
      if (restoredUser && restoredUser.username) {
        currentUserData = restoredUser;
        isOwnProfile = true;
        
        // Warn if user tried to access a different profile
        if (u && u !== restoredUser.username) {
          console.log('%c⚠️ User tried to access another profile while logged in: ' + u + ' → showing ' + restoredUser.username, 'color: #f59e0b; font-weight: bold;');
        }
        
        console.log('%c✅ User found in localStorage, setting isOwnProfile = true', 'color: #10b981; font-weight: bold;', restoredUser.username);
        fillProfile(restoredUser);
        if (btnEditProfile) btnEditProfile.style.display = 'inline-flex';
        // Show logout and delete buttons only on own profile
        if (btnLogout) btnLogout.style.display = 'inline-flex';
        if (btnDeleteAccount) btnDeleteAccount.style.display = 'inline-flex';
        // Optionally, check backend for fresher data
        try {
          const res = await fetch(`${API_BASE}/api/me`, { credentials: 'include' });
          const data = await res.json();
          console.log('API response:', data);
          if (data.username === restoredUser.username) {
            currentUserData = data;
            fillProfile(data);
          }
        } catch (err) {
          console.error('Profile backend check error', err);
        }
        return;
      }
      
      // Load profile by u parameter or logged-in user
      // Always allow editing - backend will validate ownership
      let profileUsername = u;
      
      // If no u parameter, try to get logged-in user
      if (!u) {
        try {
          console.log('No u parameter, checking /api/me for logged-in user');
          const res = await fetch(`${API_BASE}/api/me`, { credentials: 'include' });
          const data = await res.json();
          console.log('API /me response:', data);
          if (data.username) {
            profileUsername = data.username;
            currentUserData = data;
            isOwnProfile = true;
            fillProfile(data);
            if (btnEditProfile) btnEditProfile.style.display = 'inline-flex';
            return;
          }
        } catch (err) {
          console.error('Profile backend check error', err);
        }
        
        // Fallback: Check localStorage for currentUser
        const localStorageUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        if (localStorageUser && localStorageUser.username) {
          console.log('%c✅ Using localStorage user:', 'color: #10b981; font-weight: bold;', localStorageUser.username);
          profileUsername = localStorageUser.username;
          currentUserData = localStorageUser;
          isOwnProfile = true;
          fillProfile(localStorageUser);
          if (btnEditProfile) btnEditProfile.style.display = 'inline-flex';
          return;
        }
      }
      
      // Load profile by username (either from u parameter or determined above)
      if (profileUsername) {
        try {
          console.log('Loading profile for username:', profileUsername);
          const res = await fetch(`${API_BASE}/api/user/${profileUsername}`, { credentials: 'include' });
          const data = await res.json();
          console.log('Profile data loaded:', data);
          console.log('%c📌 Session check: loggedIn=' + data.loggedIn + ', isOwnProfile will be set to:', 'color: #3182ce; font-weight: bold;', data.loggedIn);
          if (data.username) {
            currentUserData = data;
            // Use the loggedIn status from the backend to determine if viewing own profile
            isOwnProfile = data.loggedIn === true;
            console.log('%c✅ isOwnProfile set based on backend loggedIn status:', 'color: #10b981;', isOwnProfile);
            fillProfile(data);
            if (btnEditProfile) {
              if (isOwnProfile) {
                btnEditProfile.style.display = 'inline-flex';
                console.log('%c📝 Edit button shown - user is viewing own profile', 'color: #8b5cf6;');
              } else {
                btnEditProfile.style.display = 'none';
                console.log('%c🔒 Edit button hidden - user is NOT viewing own profile', 'color: #ef4444;');
              }
            }
            // Show logout and delete buttons only on own profile
            if (isOwnProfile) {
              if (btnLogout) btnLogout.style.display = 'inline-flex';
              if (btnDeleteAccount) btnDeleteAccount.style.display = 'inline-flex';
            } else {
              if (btnLogout) btnLogout.style.display = 'none';
              if (btnDeleteAccount) btnDeleteAccount.style.display = 'none';
            }
          } else {
            document.getElementById('profile-name').textContent = 'User not found';
            document.getElementById('profile-username').textContent = '';
            if (btnEditProfile) btnEditProfile.style.display = 'none';
          }
        } catch (err) {
          console.error('Profile load error:', err);
          document.getElementById('profile-name').textContent = 'Error loading profile';
          if (btnEditProfile) btnEditProfile.style.display = 'none';
        }
        return;
      }
      
      // No logged-in user and no u parameter
      document.getElementById('profile-name').textContent = 'Not signed in';
      document.getElementById('profile-username').textContent = '';
      if (btnEditProfile) btnEditProfile.style.display = 'none';
    }
    
    function fillProfile(data) {
      console.log('fillProfile called with data:', data);
      document.getElementById('profile-name').textContent = data.name || data.username || 'User';
      document.getElementById('profile-username').textContent = '@' + (data.username || '');
      
      const avatarWrap = document.getElementById('profile-avatar');
      const avatarUrl = data.profilePicture || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name || data.username)}&background=3182ce&color=fff`;
      avatarWrap.innerHTML = `<img src="${avatarUrl}" alt="avatar"/>`;
      
      // Fill view mode
      fillField('pf-email', 'Email', data.email);
      fillField('pf-phone', 'Phone', data.phone);
      fillField('pf-state', 'State', data.state);
      fillField('pf-lga', 'LGA', data.lga);
      fillField('pf-address', 'Address', data.address);
      
      // Fill form mode (guarded - the page may not include the edit form)
      const elEditName = document.getElementById('edit-name'); if (elEditName) elEditName.value = data.name || '';
      const elEditEmail = document.getElementById('edit-email'); if (elEditEmail) elEditEmail.value = data.email || '';
      const elEditPhone = document.getElementById('edit-phone'); if (elEditPhone) elEditPhone.value = data.phone || '';
      const elEditState = document.getElementById('edit-state'); if (elEditState) elEditState.value = data.state || '';
      const elEditLga = document.getElementById('edit-lga'); if (elEditLga) elEditLga.value = data.lga || '';
      const elEditAddress = document.getElementById('edit-address'); if (elEditAddress) elEditAddress.value = data.address || '';
    }
    
    function fillField(elementId, label, value) {
      const element = document.getElementById(elementId);
      if (!element) return;
      
      // Convert value to string and check if it has content
      const strValue = value ? String(value).trim() : '';
      const hasValue = strValue && strValue !== '' && strValue !== 'undefined' && strValue !== 'null';
      
      element.className = hasValue ? 'profile-field' : 'profile-field empty';
      
      // Show edit buttons only if viewing own profile
      const showEditButton = isOwnProfile;
      
      console.log(`%c📝 fillField: ${elementId}, showEditButton=${showEditButton}, isOwnProfile=${isOwnProfile}`, 'color: #8b5cf6;');
      
      element.innerHTML = `
        <div class="profile-field-header">
          <strong>${label}</strong>
          ${showEditButton ? `<button class="edit-icon-btn" data-field="${elementId.replace('pf-', '')}" title="Edit ${label.toLowerCase()}">
            <i class="fas fa-edit"></i>
          </button>` : ''}
        </div>
        <div class="profile-field-value">${hasValue ? strValue : '-'}</div>
      `;
      
      // Add event listener to the edit button only if viewing own profile
      if (showEditButton) {
        const editBtn = element.querySelector('.edit-icon-btn');
        if (editBtn) {
          editBtn.addEventListener('click', function (ev) {
            ev.preventDefault();
            makeFieldEditable(element, elementId.replace('pf-', ''));
          });
        }
      }
    }

    function makeFieldEditable(fieldElement, fieldKey) {
      // Prevent multiple inline editors
      if (fieldElement.classList.contains('editing')) return;
      fieldElement.classList.add('editing');

      const valueDiv = fieldElement.querySelector('.profile-field-value');
      const header = fieldElement.querySelector('.profile-field-header');
      const headerBtn = header ? header.querySelector('.edit-icon-btn') : null;
      const currentText = valueDiv ? valueDiv.textContent.trim() : '';

      // Create input or textarea for address
      let inputEl;
      if (fieldKey === 'address') {
        inputEl = document.createElement('textarea');
        inputEl.rows = 3;
      } else {
        inputEl = document.createElement('input');
        inputEl.type = 'text';
      }
      inputEl.className = 'inline-edit-input';
      inputEl.value = (currentText === '-' ? '' : currentText);

      // Replace value with input
      if (valueDiv) valueDiv.innerHTML = '';
      valueDiv.appendChild(inputEl);
      inputEl.focus();

      // Replace edit button with save button
      const saveBtn = document.createElement('button');
      saveBtn.className = 'save-icon-btn';
      saveBtn.title = 'Save';
      saveBtn.dataset.field = fieldKey;
      saveBtn.innerHTML = '<i class="fas fa-check"></i>';

      // Optional cancel button (small X)
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'cancel-icon-btn';
      cancelBtn.title = 'Cancel';
      cancelBtn.innerHTML = '<i class="fas fa-times"></i>';

      if (header && headerBtn) {
        try {
          header.replaceChild(saveBtn, headerBtn);
          header.insertBefore(cancelBtn, saveBtn.nextSibling);
        } catch (e) {
          // fallback: append buttons
          header.appendChild(saveBtn);
          header.appendChild(cancelBtn);
        }
      } else if (header) {
        header.appendChild(saveBtn);
        header.appendChild(cancelBtn);
      }

      // Handlers
      saveBtn.addEventListener('click', function () { saveFieldInline(fieldElement, fieldKey, inputEl, saveBtn, cancelBtn); });
      cancelBtn.addEventListener('click', function () { cancelInlineEdit(fieldElement, fieldKey); });

      // Save on Enter for single-line inputs
      inputEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && inputEl.tagName.toLowerCase() === 'input') {
          e.preventDefault();
          saveBtn.click();
        } else if (e.key === 'Escape') {
          cancelBtn.click();
        }
      });
    }

    async function saveFieldInline(fieldElement, fieldKey, inputEl, saveBtn, cancelBtn) {
      const newValue = inputEl.value.trim();

      // small optimistic UI change: disable buttons
      saveBtn.disabled = true;
      cancelBtn.disabled = true;

      // Build minimal payload with just the field being edited
      const payload = {};
      payload[fieldKey] = newValue;

      // Include any existing data from currentUserData to preserve other fields
      if (currentUserData) {
        ['name', 'email', 'phone', 'state', 'lga', 'address'].forEach(k => {
          if (k !== fieldKey && currentUserData[k]) {
            payload[k] = currentUserData[k];
          }
        });
      }

      // Post the payload
      postProfileData(fieldElement, payload, fieldKey, saveBtn, cancelBtn);
    }

    function renderInlineMissingFields(fieldElement, missingKeys, payload, fieldKey, inputEl, saveBtn, cancelBtn) {
      // For each missing key, enable inline editing on its own profile field (pf-<key>)
      const enabled = [];
      missingKeys.forEach(k => {
        const pf = document.getElementById('pf-' + k);
        if (pf) {
          // if not already editing, make it editable
          if (!pf.classList.contains('editing')) {
            makeFieldEditable(pf, k);
            enabled.push(k);
          } else {
            // focus existing input
            const inp = pf.querySelector('.inline-edit-input');
            if (inp) inp.focus();
            enabled.push(k);
          }
        }
      });

      if (enabled.length === 0) {
        // no corresponding fields on page; fallback to alert and open full edit mode
        alert('Please complete missing profile fields in the full edit form.');
        enterEditMode();
      } else {
        alert('Please fill the highlighted fields inline and save each one.');
      }
    }

    async function postProfileData(fieldElement, payload, fieldKey, saveBtn, cancelBtn, container) {
      try {
        console.log('%c🔄 Posting profile data:', 'color: #06b6d4; font-weight: bold;', payload);
        const fd = new FormData();
        Object.keys(payload).forEach(k => {
          if (payload[k] !== undefined && payload[k] !== null) fd.append(k, payload[k]);
        });
        const res = await fetch(`${API_BASE}/api/update-profile`, {
          method: 'POST',
          credentials: 'include',
          body: fd
        });
        
        // Safely parse JSON response, handling non-JSON responses
        let data = {};
        try {
          const contentType = res.headers.get('content-type');
          if (contentType && contentType.includes('application/json')) {
            data = await res.json();
          } else {
            console.warn('Non-JSON response received:', res.status);
          }
        } catch (parseErr) {
          console.error('Error parsing response:', parseErr);
          // Response is not JSON (e.g., HTML error page)
        }
        
        console.log('%c📡 Profile update response status:', 'color: #06b6d4;', res.status, 'response:', data);
        if (res.ok) {
          console.log('%c✅ Profile updated successfully!', 'color: #10b981; font-weight: bold;');
          // update local cache
          currentUserData = { ...(currentUserData || {}), ...data };
          // update displayed value for the edited field
          const valueDiv = fieldElement.querySelector('.profile-field-value');
          valueDiv.textContent = payload[fieldKey] || '-';
          restoreEditButton(fieldElement, fieldKey);
          fieldElement.classList.remove('editing');
          if (window.updateAuthUI && typeof window.updateAuthUI === 'function') window.updateAuthUI(currentUserData);
          showInlineSavedIndicator(fieldElement);
          // nothing to clean up for inline editors (they are rendered on their own fields)
        } else if (res.status === 401) {
          // Session expired
          console.log('%c❌ 401 Unauthorized - Session expired!', 'color: #ef4444; font-weight: bold;');
          console.log('%c📌 Debug info: isOwnProfile=' + isOwnProfile + ', currentUserData=', 'color: #f59e0b;', currentUserData);
          
          if (isOwnProfile) {
            // Fallback to localStorage save if session expired but user is viewing own profile
            console.log('%c⚠️ Backend session expired, saving to localStorage instead', 'color: #f59e0b; font-weight: bold;');
            currentUserData = { ...(currentUserData || {}), ...payload };
            // Save to localStorage
            try {
              localStorage.setItem('currentUser', JSON.stringify(currentUserData));
              // update displayed value for the edited field
              const valueDiv = fieldElement.querySelector('.profile-field-value');
              valueDiv.textContent = payload[fieldKey] || '-';
              restoreEditButton(fieldElement, fieldKey);
              fieldElement.classList.remove('editing');
              showInlineSavedIndicator(fieldElement);
              alert('Profile saved locally. Please log in again to sync with server.');
            } catch (err) {
              console.error('localStorage save error:', err);
              alert('Could not save profile.');
              if (saveBtn) saveBtn.disabled = false;
              if (cancelBtn) cancelBtn.disabled = false;
            }
          } else {
            // 401 but not own profile - user is trying to edit someone else's profile
            console.log('%c🔒 Unauthorized - Not own profile', 'color: #ef4444;');
            alert((data && data.error) || 'You cannot edit this profile.');
            if (saveBtn) saveBtn.disabled = false;
            if (cancelBtn) cancelBtn.disabled = false;
          }
        } else if (res.status === 404) {
          console.error('%c❌ 404 Not Found - Backend endpoint not accessible', 'color: #ef4444; font-weight: bold;');
          alert('Unable to reach the save endpoint. Please check your connection and try again. Error: ' + (data.error || 'Backend not responding'));
          if (saveBtn) saveBtn.disabled = false;
          if (cancelBtn) cancelBtn.disabled = false;
        } else {
          alert((data && data.error) || 'Failed to save profile.');
          if (saveBtn) saveBtn.disabled = false;
          if (cancelBtn) cancelBtn.disabled = false;
        }
      } catch (err) {
        console.error('postProfileData error', err);
        alert('Error saving profile. Please try again.');
        if (saveBtn) saveBtn.disabled = false;
        if (cancelBtn) cancelBtn.disabled = false;
      }
    }

    function showInlineSavedIndicator(fieldElement) {
      try {
        const header = fieldElement.querySelector('.profile-field-header');
        if (!header) return;
        // create indicator
        const indicator = document.createElement('span');
        indicator.className = 'inline-save-indicator';
        indicator.style.marginLeft = '8px';
        indicator.style.color = '#16a34a';
        indicator.style.display = 'inline-flex';
        indicator.style.alignItems = 'center';
        indicator.style.gap = '6px';
        indicator.innerHTML = '<i class="fas fa-check-circle"></i><span style="font-size:0.85em">Saved</span>';
        header.appendChild(indicator);
        setTimeout(() => { indicator.remove(); }, 2200);
      } catch (e) {
        // ignore
      }
    }

    function cancelInlineEdit(fieldElement, fieldKey) {
      // restore original display
      const valueDiv = fieldElement.querySelector('.profile-field-value');
      const inputEl = valueDiv ? valueDiv.querySelector('.inline-edit-input') : null;
      const originalText = inputEl ? (inputEl.defaultValue || inputEl.value) : '-';
      if (valueDiv) valueDiv.textContent = originalText || '-';
      restoreEditButton(fieldElement, fieldKey);
      fieldElement.classList.remove('editing');
    }

    function restoreEditButton(fieldElement, fieldKey) {
      const header = fieldElement.querySelector('.profile-field-header');
      if (!header) return;
      // remove any save/cancel buttons
      const existingSave = header.querySelector('.save-icon-btn');
      const existingCancel = header.querySelector('.cancel-icon-btn');
      if (existingSave) existingSave.remove();
      if (existingCancel) existingCancel.remove();

      // create and insert edit button
      const editBtn = document.createElement('button');
      editBtn.className = 'edit-icon-btn';
      editBtn.title = 'Edit';
      editBtn.dataset.field = fieldKey;
      editBtn.innerHTML = '<i class="fas fa-edit"></i>';
      header.appendChild(editBtn);
      editBtn.addEventListener('click', function (ev) {
        ev.preventDefault();
        makeFieldEditable(fieldElement, fieldKey);
      });
    }
    
    // Delete account flow
    function handleDeleteAccountClick(e) {
      e.preventDefault();
      deleteAccount();
    }

    async function deleteAccount() {
      // require typing DELETE to confirm
      const confirmation = prompt('Type DELETE to confirm account deletion. This action cannot be undone.');
      if (!confirmation || confirmation.trim() !== 'DELETE') {
        alert('Account deletion cancelled.');
        return;
      }

      if (!confirm('Are you absolutely sure? This will permanently delete your account.')) return;

      try {
        const res = await fetch(`${API_BASE}/api/delete-account`, {
          method: 'POST',
          credentials: 'include'
        });
        const data = await res.json();
        if (res.ok) {
          // redirect to home or signout
          alert('Account deleted. Redirecting to home.');
          window.location.href = '../index.html';
        } else {
          alert((data && data.error) || 'Failed to delete account.');
        }
      } catch (err) {
        console.error('Delete account error', err);
        alert('Error deleting account. Please try again.');
      }
    }
    
    function handleFieldEditClick(e) {
      e.preventDefault();
      const fieldName = e.currentTarget.dataset.field;
      
      // Focus the corresponding input in edit form and enter edit mode
      enterEditMode();
      
      // Scroll to and focus the field
      const inputSelector = `#edit-${fieldName === 'lga' ? 'lga' : fieldName === 'phone' ? 'phone' : fieldName === 'state' ? 'state' : fieldName === 'address' ? 'address' : fieldName === 'email' ? 'email' : fieldName}`;
      const inputElement = document.querySelector(inputSelector);
      if (inputElement) {
        setTimeout(() => {
          inputElement.focus();
          inputElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
      }
    }
    
    function enterEditMode() {
      isEditMode = true;
      if (profileViewMode) profileViewMode.style.display = 'none';
      if (profileForm && profileForm.classList) profileForm.classList.add('active');
      if (btnEditProfile) btnEditProfile.style.display = 'none';
      if (btnCancelEdit) btnCancelEdit.style.display = 'inline-flex';
      if (avatarUploadHint) avatarUploadHint.style.display = 'flex';
      const avatarWrap = document.querySelector('.profile-avatar-wrapper');
      if (avatarWrap) avatarWrap.style.cursor = 'pointer';
      if (btnDeleteAccount) btnDeleteAccount.style.display = 'inline-flex';
      if (btnLogout) btnLogout.style.display = 'inline-flex';
    }
    
    function exitEditMode() {
      isEditMode = false;
      if (profileForm && profileForm.classList) profileForm.classList.remove('active');
      if (profileViewMode) profileViewMode.style.display = 'block';
      if (btnEditProfile) btnEditProfile.style.display = 'inline-flex';
      if (btnCancelEdit) btnCancelEdit.style.display = 'none';
      if (avatarUploadHint) avatarUploadHint.style.display = 'none';
      const avatarWrap2 = document.querySelector('.profile-avatar-wrapper');
      if (avatarWrap2) avatarWrap2.style.cursor = 'default';
      if (successMessage && successMessage.classList) successMessage.classList.remove('show');
      if (btnDeleteAccount) btnDeleteAccount.style.display = 'none';
      if (btnLogout) btnLogout.style.display = 'none';
    }
    
    function handleAvatarUpload(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          document.getElementById('profile-avatar').innerHTML = `<img src="${event.target.result}" alt="avatar"/>`;
          document.getElementById('edit-profile-picture-input').files = e.target.files;
          enterEditMode();
        };
        reader.readAsDataURL(file);
      }
    }
    
    function handleEditAvatarUpload(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          document.getElementById('profile-avatar').innerHTML = `<img src="${event.target.result}" alt="avatar"/>`;
        };
        reader.readAsDataURL(file);
      }
    }
    
    async function saveProfile(e) {
      e.preventDefault();
      
      const formData = new FormData();
      formData.append('name', document.getElementById('edit-name').value);
      formData.append('email', document.getElementById('edit-email').value);
      formData.append('phone', document.getElementById('edit-phone').value);
      formData.append('state', document.getElementById('edit-state').value);
      formData.append('lga', document.getElementById('edit-lga').value);
      formData.append('address', document.getElementById('edit-address').value);
      
      const fileInput = document.getElementById('edit-profile-picture-input');
      if (fileInput.files.length > 0) {
        formData.append('profilePicture', fileInput.files[0]);
      }
      
      try {
        const response = await fetch(`${API_BASE}/api/update-profile`, {
          method: 'POST',
          credentials: 'include',
          body: formData
        });
        
        const data = await response.json();
        
        if (response.ok) {
          currentUserData = { ...currentUserData, ...data };
          fillProfile(currentUserData);
          
          // Update navbar if available
          if (window.updateAuthUI && typeof window.updateAuthUI === 'function') {
            window.updateAuthUI(currentUserData);
          }
          
          // Show success message
          successMessage.classList.add('show');
          setTimeout(() => {
            successMessage.classList.remove('show');
          }, 3000);
          
          exitEditMode();
        } else {
          const errorMsg = data.error || 'Failed to update profile';
          alert('Error: ' + errorMsg);
        }
      } catch (err) {
        console.error('Save profile error', err);
        alert('Error saving profile. Please try again.');
      }
    }
    
    loadProfile();
  </script>

</body>
</html>
