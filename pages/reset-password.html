<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Yola AI Info Hub</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/auth.css">
  <link rel="stylesheet" href="../styles/navbar.css">
  <link rel="stylesheet" href="pages.css">
  <script id="navbar" src="../components/navbar.js"></script>
  
</head>
<body>
  <div id="navbar"></div>

  
  <nav class="minimal-nav">
    <div class="minimal-nav-content">
      <div href="../index.html" class="nav-logo">
        <img src="../Data/Images/jippujam.jpg" alt="Yola AI Info Hub">
        <span>Yola AI Info Hub</span>
      </div>
      <a href="../index.html" class="return-home">
        <i class="fas fa-home"></i>
        <span>Return Home</span>
      </a>
    </div>
  </nav>


  <main class="auth-container">
    <div class="auth-box">
      <h2 id="reset-title">Reset Password</h2>
      <div id="reset-body">
        <form class="auth-page-form" id="reset-form">
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
          <button type="submit">Send Reset Link</button>
          <div class="auth-error" id="reset-error"></div>
        </form>
      </div>
      <div id="reset-success" style="color:#3182ce; margin-top:1rem; text-align:center;"></div>
    </div>
  </main>
  <script>
    // Render navbar
    window.Navbar && window.Navbar.render && window.Navbar.render();

    // Determine API_BASE (same logic as components/auth.js fallback)
    const API_BASE = window.API_BASE || (function(){ try{ const h=window.location.hostname; if(!h||h==='localhost'||h==='127.0.0.1'||h.startsWith('192.')||h.startsWith('10.')||h==='::1') return 'http://localhost:4000'; return ''; }catch(e){return 'http://localhost:4000'} })();

    // Handle reset password form
    document.getElementById('reset-form').onsubmit = async function(e) {
      e.preventDefault();
      const submitBtn = this.querySelector('button[type="submit"]');
      const email = document.getElementById('email').value.trim();
      const errorDiv = document.getElementById('reset-error');
      const successDiv = document.getElementById('reset-success');
      errorDiv.textContent = '';
      successDiv.textContent = '';
      if (!email) {
        errorDiv.textContent = 'Please enter your email.';
        return;
      }
      
      // Disable button during request
      submitBtn.disabled = true;
      
      try {
        const res = await fetch(`${API_BASE}/api/forgot-password`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'include',
              body: JSON.stringify({ email })
            });
            const data = await res.json();
            
            // Re-enable button after response
            submitBtn.disabled = false;
            
            if (res.ok) {
              successDiv.textContent = 'A reset link has been sent to your email.';
            } else {
              errorDiv.textContent = data.error || 'Failed to send reset link.';
            }
      } catch (err) {
        submitBtn.disabled = false;
        errorDiv.textContent = 'Network error. Please try again.';
      }
    };

        // If token and email present, show password form to consume token
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const emailParam = params.get('email');
        if (token && emailParam) {
          document.getElementById('reset-title').textContent = 'Set a New Password';
          const body = document.getElementById('reset-body');
          body.innerHTML = `
            <form class="auth-page-form" id="consume-form">
              <input type="password" id="new-password" placeholder="New password" required />
              <input type="password" id="new-password2" placeholder="Confirm new password" required />
              <button type="submit">Reset Password</button>
              <div class="auth-error" id="consume-error"></div>
            </form>
          `;
          document.getElementById('consume-form').onsubmit = async function(e) {
            e.preventDefault();
            const submitBtn = this.querySelector('button[type="submit"]');
            const pw1 = document.getElementById('new-password').value;
            const pw2 = document.getElementById('new-password2').value;
            const err = document.getElementById('consume-error');
            err.textContent = '';
            if (pw1.length < 6) { err.textContent = 'Password must be at least 6 characters.'; return; }
            if (pw1 !== pw2) { err.textContent = 'Passwords do not match.'; return; }
            
            // Disable button during request
            submitBtn.disabled = true;
            
            try {
              const r = await fetch(`${API_BASE}/api/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email: emailParam, token, password: pw1 })
              });
              const d = await r.json();
              
              // Re-enable button after response
              submitBtn.disabled = false;
              
              if (r.ok) {
                document.getElementById('reset-success').textContent = 'Password reset successful. You can now sign in.';
                setTimeout(() => { window.location.href = '/pages/signin.html'; }, 1400);
              } else {
                err.textContent = d.error || 'Failed to reset password.';
              }
            } catch (ex) { 
              submitBtn.disabled = false;
              err.textContent = 'Network error.'; 
            }
          };
        }
  </script>
</body>
</html>
