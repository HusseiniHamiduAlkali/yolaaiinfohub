<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="reset_password">Reset Password</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/auth.css">
  <link rel="stylesheet" href="../styles/navbar.css">
  <link rel="stylesheet" href="pages.css">
  <link rel="icon" type="image/png" href="../Data/Images/jippujam.jpg">
  <script id="navbar" src="../components/navbar.js"></script>
  <script src="../components/i18n.js"></script>
  
</head>
<body>
  <nav class="minimal-nav">
    <div class="minimal-nav-content">
      <a href="../index.html" class="nav-logo">
        <img src="../Data/Images/jippujam.jpg" alt="Yola AI Info Hub">
        <span data-i18n="app_title">Yola AI Info Hub</span>
      </a>
      <a href="../index.html" class="return-home">
        <i class="fas fa-home"></i>
        <span data-i18n="return_home">Return Home</span>
      </a>
    </div>
  </nav>


  <main class="auth-container">
    <div class="auth-box">
      <h2 data-i18n="set_new_password_heading">Set a New Password</h2>
      <form class="auth-page-form" id="consume-form">
        <div class="password-field">
          <input type="password" id="new-password" data-i18n-placeholder="new_password_placeholder" placeholder="New password" required />
          <button type="button" class="password-toggle" id="toggle-password" title="Show/Hide password">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div class="password-field">
          <input type="password" id="new-password2" data-i18n-placeholder="confirm_new_password_placeholder" placeholder="Confirm new password" required />
          <button type="button" class="password-toggle" id="toggle-password2" title="Show/Hide password">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <button type="submit" data-i18n="reset_password">Reset Password</button>
        <div class="auth-error" id="consume-error"></div>
      </form>
      <div id="reset-success" style="color:#3182ce; margin-top:1rem; text-align:center;"></div>
    </div>
  </main>
  <script>
    // Render navbar
    window.Navbar && window.Navbar.render && window.Navbar.render();

    // update title on language change
    window.addEventListener('languageChanged', () => {
      document.title = window.t('reset_password') + ' - ' + window.t('app_title');
      const h2 = document.querySelector('h2');
      if (h2) h2.textContent = window.t('set_new_password_heading');
    });
    document.addEventListener('DOMContentLoaded', () => {
      document.title = window.t('reset_password') + ' - ' + window.t('app_title');
    });

    // Determine API_BASE (same logic as components/auth.js fallback)
    const API_BASE = window.API_BASE || (function(){ try{ const h=window.location.hostname; if(!h||h==='localhost'||h==='127.0.0.1'||h.startsWith('192.')||h.startsWith('10.')||h==='::1') return 'http://localhost:4000'; return 'https://yolaaiinfohub-backend.onrender.com'; }catch(e){return 'http://localhost:4000'} })();

    // Handle new-password form submission
    // token and email are read from the query string
    document.getElementById('consume-form').onsubmit = async function(e) {
      e.preventDefault();
      const submitBtn = this.querySelector('button[type="submit"]');
      const pw1 = document.getElementById('new-password').value;
      const pw2 = document.getElementById('new-password2').value;
      const err = document.getElementById('consume-error');
      err.textContent = '';
      if (pw1.length < 6) { err.textContent = window.t('password_too_short_msg'); return; }
      if (pw1 !== pw2) { err.textContent = window.t('passwords_do_not_match_msg'); return; }

      // Disable button during request
      submitBtn.disabled = true;

      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const emailParam = params.get('email');

      try {
        const r = await fetch(`${API_BASE}/api/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email: emailParam, token, password: pw1 })
        });
        const d = await r.json();

        // Re-enable button after response
        submitBtn.disabled = false;

        if (r.ok) {
          document.getElementById('reset-success').textContent = window.t('success') + '. ' + window.t('sign_in') + ' ' + window.t('back_to_home');
          setTimeout(() => { window.location.href = '/pages/signin.html'; }, 1400);
        } else {
          err.textContent = d.error || window.t('error');
        }
      } catch (ex) {
        submitBtn.disabled = false;
        err.textContent = window.t('network_error_msg');
      }
    };

    // password visibility toggles
    document.getElementById('toggle-password').addEventListener('click', function(e) {
      e.preventDefault();
      const input = document.getElementById('new-password');
      const icon = this.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    });
    document.getElementById('toggle-password2').addEventListener('click', function(e) {
      e.preventDefault();
      const input = document.getElementById('new-password2');
      const icon = this.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    });
  </script>
</body>
</html>
