<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NexRate - Currency Converter</title>
<style>
        /* Design Tokens & Theme Variables */
        :root {
            --primary: #000000;
            --on-primary: #ffffff;
            --secondary: #006c49;
            --secondary-container: #6cf8bb;
            --on-secondary-container: #00714d;
            --background: #f7f9fb;
            --surface: #f7f9fb;
            --surface-container: #eceef0;
            --surface-container-low: #f2f4f6;
            --surface-container-lowest: #ffffff;
            --outline-variant: #c6c6cd;
            --on-surface-variant: #45464d;
            --on-surface: #191c1e;
            --radius-xl: 0.5rem;
            --radius-lg: 0.25rem;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif; /* Fallback for Manrope/Hanken */
            background-color: var(--background);
            color: var(--on-surface);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Typography */
        .font-headline { font-weight: 700; }
        .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.875rem; }
        
        /* Layout Components */
        header {
            background: white;
            position: sticky;
            top: 0;
            z-index: 40;
            height: 64px;
            border-bottom: 1px solid var(--outline-variant);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        main {
            flex-grow: 1;
            padding: 24px 16px 128px 16px;
            max-width: 448px; /* max-w-md */
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Cards & UI Elements */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--outline-variant);
            border-radius: 0.75rem;
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .converted-card {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background-color: var(--secondary-container);
            color: var(--on-secondary-container);
            padding: 4px 8px;
            border-radius: var(--radius-full);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--secondary);
        }

        .currency-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface-container-low);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--outline-variant);
        }

        .flag-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--outline-variant);
        }

        .flag-img-sm {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--outline-variant);
        }

        /* Buttons */
        .swap-btn {
            background-color: var(--secondary);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -24px auto;
            position: relative;
            z-index: 10;
            cursor: pointer;
        }

        .primary-btn {
            width: 100%;
            background-color: var(--primary);
            color: var(--on-primary);
            font-weight: 700;
            font-size: 1.125rem;
            padding: 16px;
            border-radius: 0.75rem;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--shadow-md);
            cursor: pointer;
        }

        /* Utils */
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 8px; }
        .gap-4 { gap: 16px; }
        .gap-6 { gap: 24px; }
        .text-right { text-align: right; }
        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .text-secondary { color: var(--secondary); }
        .text-muted { color: var(--on-surface-variant); }
        .font-bold { font-weight: 700; }
        .font-semibold { font-weight: 600; }
        .text-2xl { font-size: 1.5rem; }
        .text-xl { font-size: 1.25rem; }

        /* Navigation */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 50;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 16px 24px 16px;
            background: var(--surface-container);
            border-top: 1px solid var(--outline-variant);
            box-shadow: var(--shadow-md);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px 16px;
            color: var(--on-surface-variant);
            gap: 2px;
        }

        .nav-item.active {
            background-color: var(--secondary-container);
            color: var(--on-secondary-container);
            border-radius: var(--radius-full);
        }

        svg {
            display: block;
        }
    </style>
</head>
