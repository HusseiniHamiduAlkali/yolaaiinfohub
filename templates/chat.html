
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1c4b" />
  <title>My Yola AI Chat</title>
  <meta name="description" content="Warm, multi-thread AI chat about Yola and beyond — voice, vision, live calls." />
  <link rel="icon" href="../Data/Images/yolarflogo.jpg" type="image/jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/global.css" />
<style>
:root {
  --indigo-dye: #04322a;
  --adire: #17997a;
  --saffron: #c9a84c;
  --saffron-soft: #f0d78c;
  --earth-wash: #f8f3e8;
  --ink: #142520;
  --muted: #6b7a74;
  --border: rgba(4, 50, 42, 0.12);
  --card: #ffffff;
  --surface: #fcfaf4;
  --bubble-user-bg: #c9a84c;
  --bubble-user-fg: #04322a;
  --bubble-ai-fg: #142520;
  --danger: #b22727;
  --shadow-soft: 0 2px 12px rgba(4, 50, 42, 0.08);
  --shadow-pop: 0 10px 30px rgba(4, 50, 42, 0.12);
  --radius: 14px;
  --font-sans: "Outfit", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-display: "Syne", var(--font-sans);
}

html[data-theme="dark"] {
  --earth-wash: #12132e;
  --ink: #f4f1ea;
  --muted: #a3a8c9;
  --border: rgba(255, 255, 255, 0.10);
  --card: #1c1e42;
  --surface: #191b3a;
  --bubble-user-bg: #eab308;
  --bubble-user-fg: #1a1c4b;
  --bubble-ai-fg: #f4f1ea;
  --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.35);
  --shadow-pop: 0 12px 32px rgba(0, 0, 0, 0.5);
}

* { box-sizing: border-box; }
*[hidden] { display: none !important; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--earth-wash);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
h1, h2, h3, .brand-name, .header-name { font-family: var(--font-display); letter-spacing: -0.02em; }
button { font-family: inherit; }

/* App shell */
.app {
  display: grid;
  grid-template-columns: 288px 1fr;
  height: 100dvh;
  background: var(--earth-wash);
}

/* Sidebar */
.sidebar {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-right: 1px solid var(--border);
  min-height: 0;
}
.sidebar-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo { width: 36px; height: 36px; border-radius: 10px; }
.brand-name { font-weight: 700; font-size: 1.05rem; line-height: 1; }
.brand-sub { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
.sidebar-close { display: none !important; }

.new-chat-btn {
  margin: 0 12px 12px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 8px; justify-content: center;
  background: var(--adire);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-weight: 600;
  cursor: pointer;
  transition: transform .1s ease, background .2s ease;
}
.new-chat-btn:hover { background: #0d7a5f; }
.new-chat-btn:active { transform: scale(0.98); }

.thread-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.thread-item {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  padding: 10px 12px;
  border-radius: 12px;
  cursor: pointer;
  transition: background .15s ease;
  border: 1px solid transparent;
}
.thread-item:hover { background: rgba(26,28,75,0.05); }
html[data-theme="dark"] .thread-item:hover { background: rgba(255,255,255,0.05); }
.thread-item.active {
  background: var(--card);
  border-color: var(--border);
  box-shadow: var(--shadow-soft);
}
.thread-title {
  font-weight: 600;
  font-size: 0.9rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--ink);
}
.thread-meta {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.thread-delete {
  opacity: 0; visibility: hidden;
  background: none; border: none; color: var(--muted); cursor: pointer;
  padding: 4px; border-radius: 8px;
  transition: opacity .15s, color .15s;
}
.thread-item:hover .thread-delete,
.thread-item.active .thread-delete { opacity: 1; visibility: visible; }
.thread-delete:hover { color: var(--danger); background: rgba(220,38,38,0.08); }

.sidebar-foot { padding: 10px 12px; border-top: 1px solid var(--border); }
.ghost-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: none; border: 1px solid var(--border);
  padding: 8px 12px; border-radius: 10px;
  color: var(--ink); cursor: pointer; font-size: 0.85rem;
  transition: background .15s ease;
}
.ghost-btn:hover { background: rgba(26,28,75,0.05); }
.ghost-btn.danger { color: var(--danger); border-color: rgba(220,38,38,0.3); }
html[data-theme="dark"] .ghost-btn:hover { background: rgba(255,255,255,0.05); }

/* Theme icon toggle */
html[data-theme="light"] .theme-icon-dark,
html[data-theme="dark"] .theme-icon-light { display: none; }

/* Main */
.main {
  display: grid;
  grid-template-rows: auto 1fr auto;
  min-height: 0;
  background: var(--earth-wash);
  position: relative;
}

/* Header */
.chat-header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--earth-wash);
  position: relative;
  z-index: 5;
}
.chat-header::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 0%, rgba(201,168,76,0.10), transparent 40%),
    radial-gradient(circle at 90% 100%, rgba(4,50,42,0.10), transparent 45%);
  pointer-events: none;
}
.chat-header > * { position: relative; }
.menu-btn { display: none !important; }
.header-title { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.header-avatar { width: 40px; height: 40px; border-radius: 12px; box-shadow: var(--shadow-soft); }
.header-name { font-weight: 700; font-size: 1rem; }
.header-status { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
.pulse {
  width: 8px; height: 8px; border-radius: 50%; background: #10b981;
  box-shadow: 0 0 0 0 rgba(16,185,129,0.6);
  animation: pulse 1.8s infinite;
}
.pulse-lg { width: 12px; height: 12px; background: var(--danger); box-shadow: 0 0 0 0 rgba(220,38,38,0.6); }
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.6); }
  70%  { box-shadow: 0 0 0 10px rgba(16,185,129,0); }
  100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
}

.header-actions { display: flex; align-items: center; gap: 10px; }
.model-switch { display: flex; align-items: center; gap: 8px; }
.model-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.model-select {
  padding: 8px 10px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card); color: var(--ink);
  font-size: 0.85rem; cursor: pointer;
  font-family: inherit;
}
.model-select:focus { outline: 2px solid var(--saffron); outline-offset: 1px; }

.icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 40px;
  background: none; border: none; border-radius: 10px;
  color: var(--ink); cursor: pointer;
  transition: background .15s ease, color .15s;
}
.icon-btn:hover { background: rgba(26,28,75,0.06); }
html[data-theme="dark"] .icon-btn:hover { background: rgba(255,255,255,0.06); }

.options-menu { position: relative; }
.options-list {
  position: absolute; right: 0; top: calc(100% + 6px);
  min-width: 220px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow-pop);
  list-style: none; margin: 0; padding: 6px;
  display: none; z-index: 10;
}
.options-list.open { display: block; }
.options-list li {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px;
  font-size: 0.9rem; cursor: pointer;
  color: var(--ink);
}
.options-list li:hover { background: rgba(26,28,75,0.06); }
html[data-theme="dark"] .options-list li:hover { background: rgba(255,255,255,0.06); }
.options-list li[data-action="delete-all"] { color: var(--danger); }

/* Messages */
.messages {
  overflow-y: auto;
  padding: 24px 20px 8px;
  display: flex; flex-direction: column; gap: 18px;
  min-height: 0;
  scroll-behavior: smooth;
}
.msg { display: flex; gap: 12px; max-width: 820px; width: 100%; margin: 0 auto; }
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--indigo-dye);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.85rem; flex: 0 0 34px;
  overflow: hidden;
}
.msg.user .msg-avatar { background: var(--saffron); color: var(--indigo-dye); }
.msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

.bubble {
  padding: 12px 16px;
  border-radius: 16px;
  max-width: min(100%, 680px);
  font-size: 0.95rem;
  line-height: 1.55;
  position: relative;
  border: 1px solid transparent;
  transition: box-shadow .15s ease;
}
.msg.user .bubble {
  background: var(--bubble-user-bg);
  color: var(--bubble-user-fg);
  border-bottom-right-radius: 6px;
}
.msg.assistant .bubble {
  color: var(--bubble-ai-fg);
  border-bottom-left-radius: 6px;
  background: transparent;
}
.msg-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0px;
  margin-top: 12px;
}
.msg-action-btn {
  border: none;
  background: transparent;
  color: var(--ink);
  border-radius: 12px;
  padding: 8px 10px;
  font-size: 0.82rem;
  cursor: pointer;
  transition: background .15s ease, transform .1s ease;
}
.msg-action-btn:hover {
  background: rgba(26,28,75,0.08);
  transform: translateY(-1px);
}
.msg-action-btn:active {
  transform: translateY(0);
}
.bubble.starred { box-shadow: 0 0 0 2px var(--saffron); }
.bubble img.attachment {
  max-width: 240px; max-height: 240px; border-radius: 10px;
  margin: 6px 6px 6px 0; display: inline-block;
}
.bubble .file-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px; margin: 4px 4px 4px 0;
  background: rgba(26,28,75,0.08); border-radius: 8px; font-size: 0.8rem;
}
.bubble p { margin: 0 0 8px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble pre {
  background: rgba(26,28,75,0.08); padding: 10px 12px; border-radius: 8px;
  overflow-x: auto; font-size: 0.85rem;
}
html[data-theme="dark"] .bubble pre { background: rgba(255,255,255,0.06); }
.bubble code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.88em; }
.bubble a { color: var(--adire); }
html[data-theme="dark"] .bubble a { color: var(--saffron); }
.bubble ul, .bubble ol { margin: 6px 0 8px; padding-left: 20px; }

.msg-time { font-size: 0.68rem; color: var(--muted); margin-top: 4px; text-align: right; }
.msg.assistant .msg-time { text-align: left; }
.typing {
  display: inline-flex; gap: 4px; align-items: center; padding: 4px 0;
}
.typing span {
  width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
  animation: blink 1.2s infinite ease-in-out;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
  40% { opacity: 1; transform: translateY(-2px); }
}

/* Empty state */
.empty-state {
  max-width: 640px; margin: auto;
  padding: 40px 20px; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.empty-logo { width: 72px; height: 72px; border-radius: 20px; box-shadow: var(--shadow-pop); }
.empty-state h1 { font-size: 1.6rem; margin: 8px 0 0; }
.empty-state p { color: var(--muted); margin: 0 0 12px; }
.faq-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 8px; width: 100%; margin-top: 8px;
}
.faq-chip {
  padding: 12px 14px; border-radius: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--ink); font-size: 0.88rem; text-align: left;
  cursor: pointer; transition: transform .1s ease, border-color .15s;
}
.faq-chip:hover { border-color: var(--saffron); transform: translateY(-1px); }

/* Composer */
.composer-wrap {
  border-top: 1px solid var(--border);
  padding: 12px 20px 16px;
  background: var(--earth-wash);
}
.attachments-preview {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;
}
.attachments-preview:empty { margin-bottom: 0; }
.attachment-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 8px 4px 4px;
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  font-size: 0.78rem;
}
.attachment-chip img { width: 28px; height: 28px; object-fit: cover; border-radius: 6px; }
.attachment-chip button {
  background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem;
  padding: 0 4px;
}

.live-call-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; margin-bottom: 8px;
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
}
.live-status { font-size: 0.85rem; font-weight: 600; }
.call-duration { font-variant-numeric: tabular-nums; color: var(--muted); margin-left: auto; }

.composer {
  display: flex; align-items: flex-end; gap: 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 8px;
  box-shadow: var(--shadow-soft);
  transition: border-color .15s;
}
.composer:focus-within { border-color: var(--saffron); }
.compose-btn { flex: 0 0 40px; color: var(--muted); }
.compose-btn:hover { color: var(--indigo-dye); }
html[data-theme="dark"] .compose-btn:hover { color: var(--saffron); }
.compose-btn.recording { color: var(--danger); animation: pulse-color 1.2s infinite; }
@keyframes pulse-color { 50% { opacity: 0.55; } }

.input {
  flex: 1; min-width: 0;
  border: none; outline: none; background: transparent; color: var(--ink);
  font-family: inherit; font-size: 0.95rem;
  padding: 10px 8px;
  resize: none; max-height: 200px;
  line-height: 1.5;
}
.input::placeholder { color: var(--muted); }

.send-btn {
  flex: 0 0 44px; height: 44px; border: none; border-radius: 12px;
  background: var(--indigo-dye); color: #fff; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background .15s ease, transform .1s ease;
}
.send-btn:hover { background: var(--adire); }
.send-btn:active { transform: scale(0.96); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.composer-hint {
  font-size: 0.7rem; color: var(--muted); margin-top: 6px; text-align: center;
}

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--indigo-dye); color: #fff;
  padding: 10px 16px; border-radius: 12px;
  font-size: 0.85rem; z-index: 100;
  box-shadow: var(--shadow-pop);
  animation: toast-in 0.2s ease;
}
@keyframes toast-in {
  from { opacity: 0; transform: translate(-50%, 8px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

.sidebar-backdrop {
  display: none;
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 40;
}

/* Responsive */
@media (max-width: 900px) {
  .model-label { display: none; }
}
@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 280px; z-index: 50;
    transform: translateX(-100%);
    transition: transform .25s ease;
    box-shadow: var(--shadow-pop);
  }
  .app.sidebar-open .sidebar { transform: translateX(0); }
  .app.sidebar-open .sidebar-backdrop { display: block; }
  .sidebar-close { display: inline-flex !important; }
  .menu-btn { display: inline-flex !important; }
  .chat-header { padding: 10px 1px; gap: 5px; min-width: 385px !important; justify-content: space-around;}
  .header-title { gap: 8px; max-width: fit-content;}
  .header-avatar { width: 34px; height: 34px; }
  .header-name { font-size: 14px; width: 112px; }
  .header-status { font-size: 0.7rem; }
  .model-switch .model-label { display: none; }
  .model-select { padding: 6px 2px; font-size: 0.8rem; max-width: 120px; }
  .header-actions { gap: 3px; }
  .composer-wrap { padding: 10px 10px 12px; }
  .composer { padding: 6px; gap: 2px; border-radius: 16px; }
  .compose-btn { width: 36px; height: 36px; flex-basis: 35px; }
  .send-btn { flex: 0 0 40px; height: 40px; }
  .input { font-size: 0.9rem; padding: 8px 6px; }
  .icon-btn {padding-inline: 0; width: 21px;}
  .messages { padding: 16px 12px 4px; }
  .empty-state { padding: 24px 12px; }
  .empty-state h1 { font-size: 1.25rem; }
  .faq-grid { grid-template-columns: 1fr; }
  .composer-hint { display: none; }
}

/* Scrollbars */
.messages::-webkit-scrollbar,
.thread-list::-webkit-scrollbar { width: 8px; }
.messages::-webkit-scrollbar-thumb,
.thread-list::-webkit-scrollbar-thumb { background: rgba(26,28,75,0.15); border-radius: 8px; }
html[data-theme="dark"] .messages::-webkit-scrollbar-thumb,
html[data-theme="dark"] .thread-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }


</style>
</head>
<body>
  <div class="app" id="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" aria-label="Conversations">
      <div class="sidebar-head">
        <div class="brand">
          <img src="../Data/Images/yolarflogo.jpg" alt="" class="brand-logo" />
          <div>
            <div class="brand-name">Yola AI</div>
            <div class="brand-sub">Chat companion</div>
          </div>
        </div>
        <button class="icon-btn sidebar-close" id="sidebar-close" title="Close sidebar" aria-label="Close sidebar">✕</button>
      </div>
      <button class="new-chat-btn" id="new-chat-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
        New chat
      </button>
      <div class="thread-list" id="thread-list"></div>
      <div class="sidebar-foot">
        <button class="ghost-btn" id="theme-toggle" title="Toggle theme">
          <span class="theme-icon-light">☀︎</span>
          <span class="theme-icon-dark">☾</span>
          <span class="theme-label">Theme</span>
        </button>
      </div>
    </aside>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- Main -->
    <main class="main">
      <header class="chat-header">
        <button class="icon-btn menu-btn" id="menu-btn" title="Menu" aria-label="Open menu">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg>
        </button>

        <div class="header-title">
          <img src="../Data/Images/yolarflogo.jpg" alt="" class="header-avatar" />
          <div>
            <div class="header-name">My Yola AI Chat</div>
            <div class="header-status"><span class="pulse"></span> Online</div>
          </div>
        </div>

        <div class="header-actions">
          <div class="model-switch">
            <label for="model-select" class="model-label">Model</label>
            <select id="model-select" class="model-select">
              <option value="openai/gpt-5.5">GPT-5.5</option>
              <option value="openai/gpt-5-mini">GPT-5 Mini</option>
              <option value="google/gemini-2.5-flash">Gemini 2.5 Flash</option>
              <option value="google/gemini-2.5-pro">Gemini 2.5 Pro</option>
            </select>
          </div>

          <div class="options-menu">
            <button class="icon-btn" id="options-trigger" title="More options" aria-haspopup="menu" aria-expanded="false">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
            </button>
            <ul class="options-list" id="options-list" role="menu">
              <li role="menuitem" data-action="toggle-mark">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 7 7 .8-5.3 4.7L18 22l-6-3.5L6 22l1.3-7.5L2 9.8 9 9z"/></svg>
                <span>Toggle star mode</span>
              </li>
              <li role="menuitem" data-action="delete-all">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                <span>Delete all messages</span>
              </li>
              <li role="menuitem" data-action="export">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <span>Export as JSON</span>
              </li>
            </ul>
          </div>

          <div class="options-menu">
            <button class="icon-btn" id="hide-chat-btn">
              <!-- X -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none"
              stroke="currentColor" stroke-width="1.5"
              viewBox="0 0 24 24" width="24" height="24">
                <path d="M4 4l16 16M20 4L4 20"/>
              </svg>
            </button>            
          </div>
          

        </div>
      </header>

      <section class="messages" id="messages" aria-live="polite"></section>

      <!-- Empty state (shown when no messages) -->
      <template id="empty-state-tpl">
        <div class="empty-state">
          <img src="../Data/Images/yolarflogo.jpg" alt="" class="empty-logo" />
          <h1>Sannu! I'm your Yola AI companion.</h1>
          <p>Ask me anything about Yola, Adamawa State — or anything else on your mind.</p>
          <div class="faq-grid">
            <button class="faq-chip" data-prompt="What is the capital of Adamawa State?">The capital of Adamawa State</button>
            <button class="faq-chip" data-prompt="What is the current time in Yola?">Current time in Yola</button>
            <button class="faq-chip" data-prompt="What are popular places to visit in Yola?">Popular places to visit</button>
            <button class="faq-chip" data-prompt="Give a brief history of Yola.">Brief history of Yola</button>
            <button class="faq-chip" data-prompt="What is the origin of the name Yola?">Origin of the name Yola</button>
            <button class="faq-chip" data-prompt="What are emergency contacts in Yola?">Emergency contacts</button>
          </div>
        </div>
      </template>

      <!-- Composer -->
      <div class="composer-wrap">
        <div class="attachments-preview" id="attachments-preview"></div>
        <div class="live-call-bar" id="live-call-bar" hidden>
          <span class="pulse pulse-lg"></span>
          <span class="live-status" id="live-status">Listening…</span>
          <span class="call-duration" id="call-duration">00:00</span>
          <button class="ghost-btn danger" id="live-mute-btn" title="Mute">Mute</button>
          <button class="ghost-btn danger" id="live-end-btn" title="End call">End call</button>
        </div>
        <form class="composer" id="composer" autocomplete="off">
          <button type="button" class="icon-btn compose-btn" id="record-btn" title="Record voice">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
          </button>

          <label class="icon-btn compose-btn" title="Upload image, audio, video, or file">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <input type="file" id="file-input" accept="image/*,audio/*,video/*,application/pdf" multiple hidden />
          </label>

          <label class="icon-btn compose-btn" title="Capture image">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <input type="file" id="camera-input" accept="image/*" capture="environment" hidden />
          </label>

          <textarea id="input" class="input" rows="1" placeholder="Ask anything about Yola…" required></textarea>

          <button type="button" class="icon-btn compose-btn" id="live-call-btn" title="Start live voice call">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.11 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.89.32 1.76.59 2.59a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.49-1.49a2 2 0 0 1 2.11-.45c.83.27 1.7.47 2.59.59A2 2 0 0 1 22 16.92z"/></svg>
          </button>

          <button type="submit" class="send-btn" id="send-btn" title="Send">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M3.4 20.4l17.45-8.47a1 1 0 0 0 0-1.8L3.4 3.66a1 1 0 0 0-1.4 1.14L4.5 11 2 17.26a1 1 0 0 0 1.4 1.14z"/></svg>
          </button>
        </form>
        <div class="composer-hint">Enter to send · Shift+Enter for newline</div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script type="module" src="/app.js"></script>
  <script src="/components/chatHandler.js" defer></script>
</body>
</html>
