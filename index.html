  <script>
    // Section loader for auth and main pages
    // Internal loader that actually performs the section load. Returns a Promise.
    window.__performLoadSection = function(section) {
      // Auth pages: hide full navbar, show minimal appbar
      const navbarDiv = document.getElementById('navbar');
      const minimalAppbar = `<div class="minimal-appbar"><span class="appname">Yola AI Info Hub</span></div>`;
      
      // Handle section-specific styles
      const sections = ['home', 'eduinfo', 'agroinfo', 'mediinfo', 'naviinfo', 'ecoinfo', 'serviinfo', 'communityinfo', 'aboutinfo'];
      sections.forEach(s => {
        document.body.classList.remove(`${s}-section`);
      });
      if (sections.includes(section)) {
        document.body.classList.add(`${section}-section`);
      }

      if (window.AuthSections && window.AuthSections[section]) {
        navbarDiv.innerHTML = minimalAppbar;
        const page = window.AuthSections[section];
        document.getElementById('main-content').innerHTML = page.render();
        if (page.mount) page.mount();
        return Promise.resolve();
      } else {
        // Restore full navbar if it was replaced by minimal appbar
        if (!navbarDiv.querySelector('.navbar')) {
          navbarDiv.innerHTML = Navbar.render();
          if (window.updateAuthUI) window.updateAuthUI(null);
        }
      }
      // Remove any previously loaded section script
      document.querySelectorAll('script[data-section-script]').forEach(s => s.remove());
      document.getElementById('main-content').innerHTML = '';
      delete window.renderSection;
      const routes = {
        home: 'components/home.js',
        eduinfo: 'components/eduinfo.js',
        agroinfo: 'components/agroinfo.js',
        mediinfo: 'components/mediinfo.js',
        naviinfo: 'components/naviinfo.js',
        communityinfo: 'components/communityinfo.js',
        aboutinfo: 'components/aboutinfo.js',
        ecoinfo: 'components/ecoinfo.js',
        serviinfo: 'components/serviinfo.js',
      };
      return new Promise((resolve) => {
  const baseSrc = routes[section] || routes['home'];
  console.log('performLoadSection: requested', section, baseSrc);
  // Fast-path: if a script with this baseSrc is already present, and renderSection is defined,
  // call renderSection directly to avoid reloading the script and potential ordering issues.
  const existingScript = Array.from(document.querySelectorAll('script[src]')).find(s => s.src && s.src.indexOf(baseSrc) !== -1);
  if (existingScript && typeof window.renderSection === 'function'){
    console.log('performLoadSection: existing script found, invoking renderSection for', section);
    try{
      const ret = window.renderSection();
      if (ret && typeof ret.then === 'function') {
        ret.then(() => {
          window.highlightActiveNav?.(section);
          resolve();
        }).catch(e => { console.error('renderSection threw (async)', e); resolve(); });
        return;
      }
    }catch(e){ console.error('renderSection threw', e); }
    window.highlightActiveNav?.(section);
    return resolve();
  }

  const script = document.createElement('script');
  // Add a small cache-buster to force re-execution when needed (helps restore)
  script.src = baseSrc + '?_r=' + Date.now();
        script.setAttribute('data-section-script', 'true');
        script.onload = () => {
          console.log('performLoadSection: script loaded for', section, 'window.renderSection exists?', typeof window.renderSection === 'function');
          try{
            if (window.renderSection) {
              const ret = window.renderSection();
              if (ret && typeof ret.then === 'function') {
                ret.then(() => {
                  window.highlightActiveNav?.(section);
                  resolve();
                }).catch(err => { console.error('renderSection error (async)', err); resolve(); });
                return;
              }
            }
          }catch(e){ console.error('renderSection error', e); }
          window.highlightActiveNav?.(section);
          resolve();
        };
  script.onerror = (err) => { console.error('Error loading section script', baseSrc, err); resolve(); };
        document.body.appendChild(script);
      });
    };

    // Public loader: if a restore is in progress, queue requests (ignore 'home')
    window.loadSection = function(section){
      window.__pendingLoadQueue = window.__pendingLoadQueue || [];
      if(window.__restoringSection){
        console.log('loadSection queued during restore:', section, 'flag state:', window.__restoringSection);
        return new Promise((resolve, reject) => {
          window.__pendingLoadQueue.push({section, resolve, reject});
        });
      }
      if(section === 'home'){
        console.log('loadSection direct (restore complete): home flag state:', window.__restoringSection, 'STACK:', new Error().stack);
      } else {
        console.log('loadSection direct (restore complete):', section, 'flag state:', window.__restoringSection);
      }
      return window.__performLoadSection(section);
    };
    // Render the navbar only once on initial load
    document.getElementById('navbar').innerHTML = Navbar.render();
    if (window.updateAuthUI) window.updateAuthUI(null);
    // Load saved section if available (restores from details page back-button), otherwise default to home
    (function(){
      const pendingSection = sessionStorage.getItem('lastSection');
      // Support both legacy 'lastScroll' and newer 'lastScrollMain'/'lastScrollWindow'
      const pendingScrollMain = parseInt(sessionStorage.getItem('lastScrollMain') || '0', 10) || 0;
      const pendingScrollWindow = parseInt(sessionStorage.getItem('lastScrollWindow') || '0', 10) || 0;
      const pendingScrollLegacy = parseInt(sessionStorage.getItem('lastScroll') || '0', 10) || 0;
      // Decide target: prefer main scroll if available, otherwise window, then legacy
      const pendingScroll = pendingScrollMain || pendingScrollWindow || pendingScrollLegacy || 0;
      console.log('index.html restore check:', {pendingSection, pendingScrollMain, pendingScrollWindow, pendingScrollLegacy, pendingScroll});
      if(pendingSection){
        // mark that we're in restore mode so other callers don't override
        window.__restoringSection = true;
        console.log('Restoring section:', pendingSection);
        // Directly perform the load for restore to avoid queuing the request
        window.__performLoadSection(pendingSection).then(()=>{
          // One deterministic scroll after the section has rendered.
          // Wait for layout stabilization (two animation frames) and retry a few times
          console.log('Section loaded, scrolling to:', pendingScroll);
          // Decide whether to restore main-content scroll or window/document scroll
          const preferMain = Boolean(pendingScrollMain && pendingScrollMain > 0);
          (async function waitAndScroll(target, useMain){
            const main = document.getElementById('main-content');
            function doScroll(){
              try{
                if(useMain && main && typeof main.scrollTo === 'function'){
                  main.scrollTo(0, target);
                } else {
                  // Try document.scrollingElement first for broader compatibility
                  const se = document.scrollingElement || document.documentElement || document.body;
                  if(se && typeof se.scrollTo === 'function') se.scrollTo(0, target);
                  else window.scrollTo(0, target);
                }
              }catch(e){ console.error('scroll error', e); }
            }
            // allow initial layout to settle (two frames)
            await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
            doScroll();
            // Wait for images inside main-content to load (or timeout) then try again
            try{
              const imgs = Array.from((main||document).querySelectorAll('img'));
              const pending = imgs.filter(img => !img.complete);
              if(pending.length){
                // Wait for all current images to load or 2500ms timeout
                await Promise.race([
                  Promise.all(pending.map(i => new Promise(res => { i.addEventListener('load', res); i.addEventListener('error', res); }))),
                  new Promise(res => setTimeout(res, 2500))
                ]);
              }

              // Also observe the DOM briefly for any images added after render (e.g., scripts inserting images)
              const addedImgs = [];
              const mo = new MutationObserver(muts => {
                for(const m of muts){
                  for(const node of Array.from(m.addedNodes || [])){
                    if(node && node.querySelectorAll){
                      Array.from(node.querySelectorAll('img')).forEach(i => addedImgs.push(i));
                    }
                    if(node && node.tagName === 'IMG') addedImgs.push(node);
                  }
                }
              });
              mo.observe(main || document.body, { childList: true, subtree: true });
              // wait briefly for possible late-added images
              await new Promise(res => setTimeout(res, 800));
              mo.disconnect();
              const newPending = addedImgs.filter(i => !i.complete);
              if(newPending.length){
                await Promise.race([
                  Promise.all(newPending.map(i => new Promise(res => { i.addEventListener('load', res); i.addEventListener('error', res); }))),
                  new Promise(res => setTimeout(res, 2000))
                ]);
              }
            }catch(e){ console.warn('wait for images failed', e); }

            // retry a few times to handle other late layout shifts (fonts, 3rd-party widgets)
            for(let i=0;i<8;i++){
              await new Promise(r=>setTimeout(r, 160));
              doScroll();
              const pos = useMain && main ? main.scrollTop : (window.scrollY || document.documentElement.scrollTop || 0);
              console.log('restore: attempt', i+1, 'measured', pos, 'target', target, 'useMain', useMain);
              if(Math.abs(pos - target) < 8) break;
            }
            // As a final attempt, if a component signals readiness via window.sectionReady, respect it
            if(typeof window.__lastSectionReady === 'number'){
              const pos = main ? main.scrollTop : (window.scrollY || window.pageYOffset || 0);
              console.log('restore: sectionReady timestamp', window.__lastSectionReady, 'measured', pos);
            }
          })(pendingScroll, preferMain);
          // Clear stored values so they aren't reused
          sessionStorage.removeItem('lastSection');
          sessionStorage.removeItem('lastScroll');
          sessionStorage.removeItem('lastScrollMain');
          sessionStorage.removeItem('lastScrollWindow');
            // Drain any queued load requests (skip any 'home' requests)
            const q = window.__pendingLoadQueue || [];
            window.__pendingLoadQueue = [];
            (async function drain(){
              for(const req of q){
                // Skip any queued home requests so restore isn't overwritten
                if(req && req.section === 'home'){
                  console.log('drain: skipping queued home request');
                  try{ req.resolve(); }catch(e){}
                  continue;
                }
                try{
                  await window.__performLoadSection(req.section);
                  req.resolve();
                }catch(err){ req.reject(err); }
              }
              // NOW unset the restoring flag after all queued items are done
              console.log('drain complete: clearing __restoringSection flag');
              window.__restoringSection = false;
              // Signal to app.js that restore just completed so it skips default load
              window.__restoreJustCompleted = true;
            })();
        }).catch((err)=>{
          console.error('Error loading section for restore', err);
          // ensure we clear the restoring flag so normal navigation resumes
          sessionStorage.removeItem('lastSection');
          sessionStorage.removeItem('lastScroll');
          window.__restoringSection = false;
        });
      } else {
        console.log('No pending section detected, loading home via else block');
        window.loadSection('home');
      }
    })();
  </script>
